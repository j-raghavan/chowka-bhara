name: CI

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Test with coverage (domain/app/transport >= 97%)
        run: npm run coverage
      - name: Build
        run: npm run build
      - name: Bundle size budget (initial JS < 300 kB gzip)
        run: npm run size
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Assert no secrets in built bundle
        run: |
          if grep -rIEl "service_role|FIREBASE_PRIVATE_KEY|BEGIN [A-Z ]*PRIVATE KEY|admin[_-]?key" dist; then
            echo "::error::Potential secret found in dist/"; exit 1
          fi
          echo "No secret patterns found in dist/."

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Live smoke test of the Supabase (cross-device) transport: insert, CAS
  # fresh/stale, reclaim tokens, presence CAS, and realtime delivery against the
  # real project. Runs on pushes to the main branches (where repo secrets are
  # available) and self-skips if the secrets are not configured, so it never
  # blocks fork PRs. Cross-device play is otherwise only exercised by the local
  # `npm run verify:supabase`.
  supabase-smoke:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify live Supabase wiring + hardening (skips if secrets absent)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Optional: enables the write-path CAS mechanics + realtime checks and
          # cleanup. The script still asserts anon writes are denied without it.
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "Supabase secrets not configured — skipping live verification."
            exit 0
          fi
          node scripts/verify-supabase.mjs
